<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureTrade - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0A0A0F;
      color: #F4F3EF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    h2 { font-size: 16px; font-weight: 600; color: rgba(244,243,239,0.5); margin-bottom: 24px; }
    p { font-size: 14px; color: rgba(244,243,239,0.7); line-height: 1.6; max-width: 320px; margin-bottom: 32px; }
    .btn {
      background: #C8A96E;
      color: #0A0A0F;
      border: none;
      border-radius: 14px;
      padding: 16px 32px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .notice {
      margin-top: 40px;
      padding: 16px;
      background: rgba(200,169,110,0.1);
      border-radius: 12px;
      font-size: 12px;
      color: #C8A96E;
    }
  </style>
</head>
<body>
  <div class="icon">📴</div>
  <h1>Huna Mtandao</h1>
  <h2>You're Offline</h2>
  <p>
    Muunganisho wa mtandao umekatika. Miamala yako imehifadhiwa na itasindikwa mara tu utakapounganisha tena.
  </p>
  <p style="font-style: italic; color: rgba(244,243,239,0.4);">
    Your connection was lost. Your transactions are saved and will process when you reconnect.
  </p>
  <button class="btn" onclick="location.reload()">Jaribu Tena / Retry</button>
  <div class="notice">
    🔒 Pesa yako ipo salama / Your money is safe
  </div>
</body>
</html>
